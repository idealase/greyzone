name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend
        working-directory: apps/web
        run: npm ci && npm run build
      - name: Build engine
        working-directory: services/sim-engine
        run: cargo build --release
      - name: Deploy
        run: bash infra/dev/deploy.sh
