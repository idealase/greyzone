name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  engine:
    name: Simulation Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/sim-engine
      - name: Check formatting
        working-directory: services/sim-engine
        run: cargo fmt -- --check
      - name: Clippy
        working-directory: services/sim-engine
        run: cargo clippy -- -D warnings
      - name: Test
        working-directory: services/sim-engine
        run: cargo test --verbose
      - name: Build release
        working-directory: services/sim-engine
        run: cargo build --release

  api:
    name: API Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        working-directory: apps/api
        run: ruff check app/
      - name: Type check
        working-directory: apps/api
        run: mypy app/ --ignore-missing-imports
      - name: Test
        working-directory: apps/api
        run: pytest app/tests/ -v --tb=short

  web:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Type check
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Test
        working-directory: apps/web
        run: npx vitest run
      - name: Build
        working-directory: apps/web
        run: npm run build

  ai-agent:
    name: AI Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/ai-agent/package-lock.json
      - name: Install dependencies
        working-directory: apps/ai-agent
        run: npm ci
      - name: Type check
        working-directory: apps/ai-agent
        run: npx tsc --noEmit
      - name: Test
        working-directory: apps/ai-agent
        run: npx vitest run
      - name: Build
        working-directory: apps/ai-agent
        run: npm run build
