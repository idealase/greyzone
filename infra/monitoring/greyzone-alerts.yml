groups:
  - name: greyzone
    rules:
      - alert: GreyzoneApiDown
        expr: up{job="greyzone-api"} == 0
        for: 1m
        labels:
          severity: critical
          app: greyzone
        annotations:
          summary: "Greyzone API is down"
          description: "Prometheus cannot scrape greyzone-api (localhost:8010). The API process may have crashed."

      - alert: GreyzoneEngineErrors
        expr: increase(greyzone_engine_errors_total[5m]) > 3
        for: 0m
        labels:
          severity: warning
          app: greyzone
        annotations:
          summary: "Greyzone engine errors spiking"
          description: "{{ $value }} engine errors in the last 5 minutes."

      - alert: GreyzoneHighLatency
        expr: histogram_quantile(0.95, sum(rate(greyzone_http_request_duration_seconds_bucket[5m])) by (le)) > 5
        for: 5m
        labels:
          severity: warning
          app: greyzone
        annotations:
          summary: "Greyzone API p95 latency above 5s"
          description: "95th percentile latency is {{ $value | humanizeDuration }}."

      - alert: GreyzoneHighErrorRate
        expr: sum(rate(greyzone_http_requests_total{status_code=~"5.."}[5m])) / sum(rate(greyzone_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          app: greyzone
        annotations:
          summary: "Greyzone API error rate above 5%"
          description: "Error rate is {{ $value | humanizePercentage }}."

      - alert: GreyzoneAiAgentErrors
        expr: increase(greyzone_ai_agent_errors_total[10m]) > 5
        for: 0m
        labels:
          severity: warning
          app: greyzone
        annotations:
          summary: "Greyzone AI agent failing repeatedly"
          description: "{{ $value }} AI agent errors in the last 10 minutes."
